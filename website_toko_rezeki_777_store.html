<!DOCTYPE html>

    body {

      margin: 0;
      background: linear-gradient(to bottom, #fff0f5, #fffaf0);
      color: #5a5a5a;
    }

    header {
      background: #ffd6e0;

    h2 {

    }

      padding: 12px 25px;
      background: #ff8fab;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      margin-top: 15px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff6f91;
      transform: scale(1.05);
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      background: #ffe4ec;
      font-size: 13px;
      border-top: 2px dashed #ffb3c6;
